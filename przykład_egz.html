<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>INF03 – Zadania egzaminacyjne JS</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #0d47a1;
}

section {
    max-width: 600px;
    margin: 0 auto 25px auto;
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
}

h2 {
    margin-top: 0;
    margin-bottom: 15px;
    color: #1565c0;
    font-size: 20px;
    border-bottom: 2px solid #e3f2fd;
    padding-bottom: 5px;
}

input[type="number"],
select {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input[type="radio"],
input[type="checkbox"] {
    margin-right: 6px;
}

button {
    background: #1976d2;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background: #0d47a1;
}

.wynik {
    margin-top: 12px;
    padding: 10px;
    background: #e3f2fd;
    border-left: 5px solid #1976d2;
    border-radius: 6px;
    font-weight: bold;
    color: #0d47a1;
}
</style>
</head>

<body>

<h1>INF03 – Zadania egzaminacyjne (HTML + CSS + JS)</h1>

<section>
<h2>1. Kalkulator usług</h2>
<input type="number" id="godziny" placeholder="Liczba godzin">
<select id="usluga">
    <option value="80">Serwis komputerowy</option>
    <option value="50">Instalacja oprogramowania</option>
    <option value="100">Szkolenie</option>
</select>
<button onclick="zad1()">Oblicz</button>
<div class="wynik" id="wynik1"></div>
</section>

<section>
<h2>2. Zamówienie pizzy</h2>
<input type="radio" name="pizza" value="20"> Mała<br>
<input type="radio" name="pizza" value="25"> Średnia<br>
<input type="radio" name="pizza" value="30"> Duża<br>
<input type="number" id="iloscPizz" placeholder="Ilość pizz">
<button onclick="zad2()">Oblicz</button>
<div class="wynik" id="wynik2"></div>
</section>

<section>
<h2>3. Średnia ocen</h2>
<input type="number" class="ocena" placeholder="Ocena 1">
<input type="number" class="ocena" placeholder="Ocena 2">
<input type="number" class="ocena" placeholder="Ocena 3">
<input type="number" class="ocena" placeholder="Ocena 4">
<input type="number" class="ocena" placeholder="Ocena 5">
<button onclick="zad3()">Sprawdź</button>
<div class="wynik" id="wynik3"></div>
</section>

<section>
<h2>4. Dodatki samochodowe</h2>
<input type="checkbox" value="2000"> Klimatyzacja<br>
<input type="checkbox" value="3000"> Skóra<br>
<input type="checkbox" value="1500"> Nawigacja<br>
<button onclick="zad4()">Oblicz</button>
<div class="wynik" id="wynik4"></div>
</section>

<section>
<h2>5. BMI</h2>
<input type="number" id="waga" placeholder="Waga (kg)">
<input type="number" step="0.01" id="wzrost" placeholder="Wzrost (m)">
<button onclick="zad5()">Oblicz BMI</button>
<div class="wynik" id="wynik5"></div>
</section>

<section>
<h2>6. Konwersja jednostek</h2>
<input type="number" id="wartosc" placeholder="Wartość">
<select id="jednostka">
    <option value="100">metry → centymetry</option>
    <option value="1000">kilogramy → gramy</option>
    <option value="60">godziny → minuty</option>
</select>
<button onclick="zad6()">Przelicz</button>
<div class="wynik" id="wynik6"></div>
</section>

<section>
<h2>7. Liczby parzyste</h2>
<input type="number" id="n" placeholder="Podaj liczbę">
<button onclick="zad7()">Pokaż</button>
<div class="wynik" id="wynik7"></div>
</section>

<section>
<h2>8. Rabat</h2>
<input type="number" id="kwota" placeholder="Kwota zakupu">
<button onclick="zad8()">Oblicz</button>
<div class="wynik" id="wynik8"></div>
</section>

<section>
<h2>9. Ocena (switch)</h2>
<input type="number" id="ocenaSwitch" placeholder="Ocena 1–6">
<button onclick="zad9()">Sprawdź</button>
<div class="wynik" id="wynik9"></div>
</section>

<section>
<h2>10. Zamówienie</h2>
<input type="number" id="iloscProd" placeholder="Ilość">
<input type="number" id="cenaProd" placeholder="Cena">
<select id="klient">
    <option value="0">Klient normalny</option>
    <option value="0.15">Klient premium</option>
</select>
<button onclick="zad10()">Oblicz</button>
<div class="wynik" id="wynik10"></div>
</section>

<!-- Podpięcie JS -->
<script src="skrypt.js"></script>

</body>
</html>
