<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Prosty formularz</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.formularz {
    background: white;
    padding: 25px;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1565c0;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #0d47a1;
}
</style>
</head>

<body>

<div class="formularz">
    <h2>Formularz kontaktowy</h2>

    <form>
        <label for="imie">Imię</label>
        <input type="text" id="imie" required>

        <label for="nazwisko">Nazwisko</label>
        <input type="text" id="nazwisko" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="telefon">Telefon</label>
        <input type="tel" id="telefon">

        <button type="submit">Wyślij</button>
    </form>
</div>

</body>
</html>
