<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>JS2–JS4 MASÓWKA</title>
<style>
  body { font-family: Arial; padding: 20px; }
  .box { width: 100px; height: 100px; background: lightgray; margin: 10px; }
  #dynamic-container { margin-top: 20px; border: 1px solid #aaa; padding: 10px; }

  #custom-box {
    width: 200px;
    height: 200px;
    background: #ddd;
    margin-top: 20px;
    transition: all 0.3s ease;
  }

  .panel {
    padding: 10px;
    background: #f0f0f0;
    border: 1px solid #aaa;
    margin-bottom: 20px;
  }

  hr { margin: 40px 0; }
</style>
</head>
<body>

<h1>MEGA PLIK – JS2 → JS3 → JS4</h1>

<!-- =============================================
                  JS_2
============================================== -->

<h2>JS_2 – Tablice dynamiczne</h2>

<button id="arr-add">Dodaj element</button>
<button id="arr-remove">Usuń ostatni</button>
<pre id="arr-out"></pre>

<hr>

<h2>JS_2 – Tablica o rozmiarze od użytkownika</h2>
<input type="number" id="arr-size" placeholder="Podaj rozmiar">
<button id="arr-generate">Generuj tablicę</button>
<pre id="arr-size-out"></pre>

<hr>

<h2>JS_2 – Tworzenie elementów</h2>

<button id="create-div">Utwórz DIV</button>
<button id="create-section">Utwórz SECTION</button>

<div id="dynamic-container"></div>

<hr>

<!-- =============================================
                  JS_3
============================================== -->

<h2>JS_3 – Kolory elementów na stronie</h2>

<button id="change-header">Zmień kolor nagłówka</button>
<button id="change-paragraph">Kolor paragrafu</button>
<button id="change-boxes">Koloruj boxy</button>

<p id="text-par">To jest przykładowy paragraf.</p>

<div class="box"></div>
<div class="box"></div>
<div class="box"></div>

<hr><hr>

<!-- =============================================
                SCRIPT – JS2 + JS3
============================================== -->
<script>
/* =====================================================
   JS_2 – TABLICE DYNAMICZNE
===================================================== */
let arr = [];

function updateArrOutput() {
  document.getElementById("arr-out").textContent = JSON.stringify(arr, null, 2);
}

document.getElementById("arr-add").addEventListener("click", () => {
  arr.push("element " + (arr.length + 1));
  updateArrOutput();
});

document.getElementById("arr-remove").addEventListener("click", () => {
  arr.pop();
  updateArrOutput();
});


/* =====================================================
   JS_2 – TABLICA OD UŻYTKOWNIKA
===================================================== */
document.getElementById("arr-generate").addEventListener("click", () => {
  const size = Number(document.getElementById("arr-size").value);
  const out = document.getElementById("arr-size-out");

  if (size <= 0) {
    out.textContent = "Podaj poprawną wartość!";
    return;
  }

  let newArr = [];
  for (let i = 0; i < size; i++) newArr.push("Element_" + i);

  out.textContent = JSON.stringify(newArr, null, 2);
});

/* =====================================================
   JS_2 – TWORZENIE ELEMENTÓW
===================================================== */
function createElement(type, text) {
  const el = document.createElement(type);
  el.textContent = text;
  el.style.padding = "10px";
  el.style.margin = "5px";
  el.style.border = "1px solid #333";
  return el;
}

document.getElementById("create-div").addEventListener("click", () => {
  document.getElementById("dynamic-container")
    .appendChild(createElement("div", "Nowy DIV"));
});

document.getElementById("create-section").addEventListener("click", () => {
  const el = createElement("section", "Nowa SECTION");
  el.style.background = "#eef";
  document.getElementById("dynamic-container").appendChild(el);
});


/* =====================================================
   JS_3 – ZMIANY KOLORÓW
===================================================== */
document.getElementById("change-header").addEventListener("click", () => {
  document.querySelector("h1").style.color = "purple";
});

document.getElementById("change-paragraph").addEventListener("click", () => {
  document.getElementById("text-par").style.backgroundColor = "yellow";
});

document.getElementById("change-boxes").addEventListener("click", () => {
  const colors = ["red", "green", "blue", "purple", "orange"];
  document.querySelectorAll(".box").forEach((box, index) => {
    box.style.backgroundColor = colors[index % colors.length];
  });
});

</script>

</body>
</html>
